<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heksatex - Warping Production Plan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="supervisor-page" data-page="supervisor-list">

  <header class="planner-header">
    <div class="planner-logo-area">
      <img src="http://157.20.244.218:8880/hms/dist/img/logo.png" alt="Logo" />
      <span>Warping Production Plan</span>
    </div>
    <div class="planner-iot-badge"><div class="dot"></div><span>IoT: ONLINE</span></div>
  </header>

  <div class="supervisor-toolbar">
    <!-- <input type="text" id="supervisorSearch" class="planner-input-filter" placeholder="🔍 Cari mesin..."> -->
    <span class="planner-tips-text" id="supervisorClock"></span>
  </div>

  <div class="supervisor-cards-grid" id="supervisorCards"></div>

  <div class="modal-overlay" id="assignModal">
    <div class="modal-box neutral">
      <div class="modal-header neutral"><span>👤 Assign Operator</span></div>
      <div class="modal-body">
        <div class="planner-modal-input-group stacked">
          <label>MO / Mesin</label>
          <div id="assignModalMoInfo" style="font-weight:600;"></div>
        </div>
        <div class="planner-modal-input-group stacked">
          <label>Nama Operator</label>
          <input type="text" id="assignOperatorInput" placeholder="Ketik nama operator...">
        </div>
        <div class="planner-modal-input-group stacked">
          <label>Shift</label>
          <select id="assignShiftSelect"></select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal btn-cancel" id="btnCancelAssign" type="button">❌ Batal</button>
        <button class="btn-modal btn-confirm-neutral" id="btnOkAssign" type="button">✅ Ok</button>
        <button class="btn-modal btn-confirm-open" id="btnOkOpenAssign" type="button">🚀 Ok &amp; Buka Operator Input</button>
      </div>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
