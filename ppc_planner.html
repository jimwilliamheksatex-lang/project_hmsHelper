<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPC Warping MES Workstation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="planner-page" data-page="planner">

  <header class="planner-header">
    <div class="planner-logo-area">
      <img src="http://157.20.244.218:8880/hms/dist/img/logo.png" alt="Logo" />
      <span>PPC Warping MES Workstation</span>
    </div>
    <div class="planner-iot-badge"><div class="dot"></div><span>IoT: ONLINE</span></div>
  </header>

  <div class="planner-workspace">
    <div class="planner-gantt-section" id="ganttSection">
      <div class="planner-gantt-scroll" id="ganttScroll">
        <div class="planner-gantt-header-row" id="ganttHeaderRow">
          <div class="planner-sticky-corner">MESIN (A-Z)</div>
          <div class="planner-timeline-header-track" id="timeHeaderTrack"></div>
        </div>
        <div id="ganttBody"></div>
        <div class="planner-snap-ghost" id="snapGhost"></div>
        <div class="planner-now-line" id="nowLine"></div>
      </div>
    </div>

    <div class="planner-control-bar">
      <div class="planner-arduino-controls">
        <span class="planner-sim-label">🔌 SIM:</span>
        <button class="planner-btn-sim" id="btnToggleTrouble" type="button">🔴 Trigger Trouble</button>
        <button class="planner-btn-sim planner-btn-nav" id="btnScrollToday" type="button">🎯 Lompat ke Hari Ini</button>
      </div>
      <div class="planner-tips-text">💡 Drag blok ke tabel = batal | Klik kanan blok = Fix/Unfix</div>
    </div>

    <div class="planner-table-section" id="tableSection">
      <div class="planner-table-header">
        <div class="planner-table-title">
          <span>📋 Warping Manufacturing Order</span>
          <span class="planner-table-drop-hint">⬇️ Drop blok di sini untuk kembalikan</span>
        </div>
        <div class="planner-filter-controls">
          <input type="text" id="searchInput" class="planner-input-filter" placeholder="🔍 Cari...">
          <select id="statusFilter" class="planner-select-filter">
            <option value="NOT_SCHEDULED">📌 Belum Dijadwalkan</option>
            <option value="ALL">📋 Semua</option>
            <option value="ready">🟢 Ready</option>
            <option value="scheduled">🔵 Scheduled</option>
            <option value="fixed">✅ Fixed</option>
            <option value="in_progress">⚙️ Running</option>
            <option value="done">✅ Done</option>
          </select>
        </div>
      </div>
      <div class="planner-table-container">
        <table id="moTable">
          <thead>
            <tr>
              <th>No<div class="resize-handle"></div></th>
              <th>Nomor MO<div class="resize-handle"></div></th>
              <th>MC<div class="resize-handle"></div></th>
              <th>Jenis Benang<div class="resize-handle"></div></th>
              <th>Lot<div class="resize-handle"></div></th>
              <th>Target Beam<div class="resize-handle"></div></th>
              <th>GB<div class="resize-handle"></div></th>
              <th>Stok<div class="resize-handle"></div></th>
              <th>Status<div class="resize-handle"></div></th>
            </tr>
          </thead>
          <tbody id="moTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="warningModal">
    <div class="modal-box">
      <div class="modal-header"><span>⚠️ PERINGATAN</span></div>
      <div class="modal-body" id="modalTextContent"></div>
      <div class="planner-modal-input-group" id="setupDurationGroup" style="display:none;">
        <label>⏱️ Durasi pasang benang (menit):</label>
        <input type="number" id="setupDurationInput" value="45" min="1" max="480" step="5">
      </div>
      <div class="planner-modal-input-group" id="cheeseKgGroup" style="display:none;">
        <label>⚖️ Berat cheese baru (kg):</label>
        <input type="number" id="cheeseKgInput" min="0" step="0.1" placeholder="0.0">
      </div>
      <div class="modal-footer">
        <button class="btn-modal btn-cancel" id="btnCancelModal" type="button">❌ Batal</button>
        <button class="btn-modal btn-confirm-warn" id="btnConfirmReroute" type="button">⚡ Lanjutkan</button>
      </div>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
