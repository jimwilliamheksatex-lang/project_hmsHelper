<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Warping Job Order - MC1</title>
  <link rel="stylesheet" href="style.css">
  <!-- Error detection: catch resource load failures for style.css and app.js -->
  <script>
    window.addEventListener('error', function(e) {
      if (e.filename && (e.filename.includes('style.css') || e.filename.includes('app.js'))) {
        console.error('[App] Failed to load:', e.filename, e.message || '(no message)');
      }
    }, true /* capture phase, required for resource errors */);
  </script>
</head>
<body class="operator-page" data-page="operator">

<div class="operator-container">
  <div class="operator-top-bar">
    <img src="http://157.20.244.218:8880/hms/dist/img/logo.png" alt="Logo" class="operator-logo">
    <h1>WARPING JOB ORDER</h1>
    <div class="operator-machine-id">MC1</div>
  </div>

  <!-- MO HEADER -->
  <div class="operator-mo-header">
    <div class="form-group"><label>MO Number</label><span>MO260700124</span></div>
    <div class="form-group"><label>Knitting MC</label><span>MC48</span></div>
    <div class="form-group"><label>Operator</label><span id="opName">Arif</span></div>
    <div class="form-group"><label>Shift</label><span id="opShift">Siang</span></div>
    <div class="form-group"><label>Benang</label><span>POLY SDY SD 75-36/560</span></div>
    <div class="form-group"><label>Target Beam</label><span id="targetBeam">6</span></div>
    <div class="form-group"><label>GB</label><span>2</span></div>
    <div class="form-group"><label>Speed Target</label><span id="mcSpeed">500 RPM</span></div>
    <div class="form-group"><label>Order per Beam</label><span id="panjangTarget">13.253 m</span></div>
    <div class="form-group"><label>Lembar</label><span id="lembarValue">560</span></div>
    <div class="form-group"><label>Denier</label><span id="denierValue">75</span></div>
    <div class="form-group"><label>Slowert / Tension</label><span id="tensionValue"></span></div>
  </div>

  <!-- ESTIMASI SISA -->
  <div class="operator-estimasi-box" id="estimasiBox">
    <span class="label">⏱ Estimasi Sisa Pekerjaan:</span>
    <span class="value" id="estimasiValue">— (mulai bekerja dulu)</span>
  </div>

  <button id="startBtn" class="operator-btn-start" onclick="App.OperatorView.startTimer()">Mulai Bekerja</button>

  <!-- FORM INPUT -->
  <div id="formInput" class="operator-input-section">
    <div class="form-group">
      <label>Beam No.</label>
      <input list="beamList" id="beamNo" placeholder="Ketik nomor...">
      <datalist id="beamList"></datalist>
    </div>
    <div class="form-group">
      <label>UI (mm)</label>
      <input type="text" id="uiValue" readonly class="input-readonly">
    </div>
    <div class="form-group">
      <label>Speed</label>
      <input type="number" id="speed" step="any">
    </div>
    <div class="form-group">
      <label>Panjang Akhir (m)</label>
      <input type="number" id="panjangAkhir" step="any">
    </div>
    <div class="form-group">
      <label>Grade</label>
      <select id="grade"><option>A</option><option>B</option><option>C</option></select>
    </div>
    <div class="form-group">
      <label>UA (Out)</label>
      <input type="text" id="ua" placeholder="UA">
    </div>
    <div class="form-group">
      <label>Winding</label>
      <input type="number" id="winding" placeholder="Winding">
    </div>
    <div class="form-group">
      <label>Amplas &amp; Bersih</label>
      <input type="checkbox" id="amplas">
    </div>
    <div class="form-group">
      <!-- spacing -->
    </div>
    <div class="form-group full-width">
      <label>Cacat</label>
      <textarea id="cacat" placeholder="Deskripsi" rows="3"></textarea>
    </div>
  </div>

  <button id="addBtn" class="operator-btn-done hidden" onclick="App.OperatorView.addBeam()">Done - Add Beam</button>
  <button id="finishBtn" class="operator-btn-selesai hidden" onclick="App.OperatorView.finishMO()">Selesai - Lanjut ke MO Berikutnya</button>

  <!-- TABEL HPH -->
  <table id="beamTable" class="operator-table">
    <thead>
      <tr>
        <th>Waktu Selesai</th>
        <th>Beam</th>
        <th>UI</th>
        <th>Speed</th>
        <th>Panjang</th>
        <th>Winding</th>
        <th>Cacat</th>
        <th>Grade</th>
        <th>UA</th>
        <th>Berat</th>
        <th>Amplas</th>
        <th>Operator</th>
        <th>Shift</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script src="app.js"></script>
<script>
  // Error detection: warn if app.js fails to load
  if (typeof App === 'undefined') {
    console.error('[App] app.js failed to load — check that the file exists in the same directory.');
  }
</script>
</body>
</html>
